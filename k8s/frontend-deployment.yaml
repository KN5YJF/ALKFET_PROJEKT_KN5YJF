apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-frontend
  template:
    metadata:
      labels:
        app: todo-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/kn5yjf/alkfet_projekt_kn5yjf/frontend:latest
          ports:
            - containerPort: 80